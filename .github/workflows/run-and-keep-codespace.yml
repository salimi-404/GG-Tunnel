name: Auto Run GG-Tunnel and Save Config

on:
  workflow_dispatch:

jobs:
  auto-run-codespace:
    name: Auto Run GG-Tunnel in Codespace
    runs-on: ubuntu-latest
    permissions:
      contents: write
      codespaces: write
      actions: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create codespace
        id: create_cs
        run: |
          echo "Creating codespace from ${{ github.repository }}..."
          
          CS_OUTPUT=$(gh codespace create \
            --repo ${{ github.repository }} \
            --branch main \
            --machine basicLinux32gb \
            --display-name "gg-tunnel-auto-$(date +%Y%m%d-%H%M%S)" \
            --idle-timeout 30m \
            --retention-period 1d)
          
          CS_NAME=$(echo "$CS_OUTPUT" | grep -o '"name":"[^"]*"' | head -1 | cut -d'"' -f4)
          
          if [ -z "$CS_NAME" ]; then
            sleep 10
            CS_NAME=$(gh codespace list --json name,createdAt --jq 'sort_by(.createdAt) | last(.[]).name')
          fi
          
          echo "cs_name=$CS_NAME" >> $GITHUB_OUTPUT
          echo "Codespace created: $CS_NAME"

      - name: Wait for VS Code and auto-script to complete
        run: |
          echo "Waiting for VS Code to fully load and auto-script to run..."
          echo "This may take 2-5 minutes depending on the script"
          sleep 120
          
          echo "Waiting additional 60 seconds for script completion..."
          sleep 60

      - name: Capture terminal output from VS Code
        id: capture_output
        run: |
          CS="${{ steps.create_cs.outputs.cs_name }}"
          
          echo "Capturing terminal output from VS Code..."
          echo "========================================="
          
          gh codespace ssh -c "$CS" -- bash -c '
          echo "=== CAPTURING VS CODE TERMINAL OUTPUT ==="
          echo ""
          
          echo "--- Bash History (commands run in terminal) ---"
          if [ -f "$HOME/.bash_history" ]; then
            tail -500 "$HOME/.bash_history"
          fi
          
          echo ""
          echo "--- VS Code PtyHost Log (live terminal session) ---"
          PTY_LOG=$(find $HOME/.vscode-remote/data/logs -name "ptyhost*.log" 2>/dev/null | head -1)
          if [ -n "$PTY_LOG" ]; then
            echo "File: $PTY_LOG"
            cat "$PTY_LOG" 2>/dev/null
          fi
          
          echo ""
          echo "--- VS Code Renderer Log ---"
          RENDERER_LOG=$(find $HOME/.vscode-remote/data/logs -name "renderer*.log" 2>/dev/null | head -1)
          if [ -n "$RENDERER_LOG" ]; then
            cat "$RENDERER_LOG" 2>/dev/null
          fi
          
          echo ""
          echo "--- Workspace directory contents ---"
          ls -la /workspaces/${{ github.repository.name }}
          ' 2>&1 | tee terminal_full_output.log

      - name: Extract GG-Tunnel config from terminal output
        id: extract_config
        run: |
          echo "Extracting GG-Tunnel configuration..."
          
          if grep -q "G-Tunnel GAMING CONFIGS" terminal_full_output.log; then
            echo "Found G-Tunnel GAMING CONFIGS in logs"
            grep -A 500 "G-Tunnel GAMING CONFIGS" terminal_full_output.log | head -500 > config_extracted.txt
          elif grep -q "GG-Tunnel" terminal_full_output.log; then
            echo "Found GG-Tunnel related content"
            grep -A 300 "GG-Tunnel" terminal_full_output.log > config_extracted.txt
          else
            echo "No specific config found, saving full terminal output"
            cat terminal_full_output.log > config_extracted.txt
          fi

      - name: Save Config.txt to repository root
        run: |
          echo "Saving configuration to Config.txt"
          
          {
            echo "========================================"
            echo "GG-Tunnel Configuration"
            echo "Extracted from Codespace Terminal"
            echo "========================================"
            echo "Date: $(date)"
            echo "Repository: ${{ github.repository }}"
            echo "Codespace: ${{ steps.create_cs.outputs.cs_name }}"
            echo "========================================"
            echo ""
            cat config_extracted.txt
          } > Config.txt
          
          echo ""
          echo "Config.txt saved with $(wc -l Config.txt) lines"

      - name: Get codespace URL
        id: cs_info
        run: |
          CS="${{ steps.create_cs.outputs.cs_name }}"
          CS_URL=$(gh codespace view -c "$CS" --json webUrl --jq '.webUrl')
          echo "cs_url=$CS_URL" >> $GITHUB_OUTPUT
          echo "Codespace URL: $CS_URL"

      - name: Commit and push Config.txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add Config.txt
          git commit -m "Update Config.txt from auto-run [skip ci]" || echo "No changes to commit"
          git push origin main || git push origin master || echo "Push failed"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gg-tunnel-complete-logs
          path: |
            *.log
            *.txt
            Config.txt
          retention-days: 30

      - name: Show summary
        if: always()
        run: |
          {
            echo "## GG-Tunnel Auto Execution Complete"
            echo ""
            echo "### Config File"
            echo "Config.txt has been saved to the repository root"
            echo ""
            echo "### Codespace (Still Active)"
            echo "[Open Codespace](${{ steps.cs_info.outputs.cs_url }})"
            echo ""
            echo "### Config Content Preview"
            echo '```'
            head -100 Config.txt
            echo '```'
            echo ""
            echo "### Download Full Logs"
            echo "Download artifact: gg-tunnel-complete-logs"
          } >> $GITHUB_STEP_SUMMARY

      - name: Keep codespace alive
        if: always()
        run: |
          echo "========================================="
          echo "Codespace is still active!"
          echo "========================================="
          echo ""
          echo "URL: ${{ steps.cs_info.outputs.cs_url }}"
          echo ""
          echo "The codespace will remain active for 30 minutes of idle time"
          echo "or 1 day retention period."
          echo ""
          echo "Config.txt has been saved to the repository."
