name: Run Script in DevContainer Codespace and Keep It Alive

on:
  workflow_dispatch:
    inputs:
      script_to_run:
        description: 'Script or command to run in terminal'
        required: true
        default: 'bash start.sh'
        type: string

jobs:
  run-in-codespace-no-delete:
    name: Run in Codespace (No Deletion)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      codespaces: write
      actions: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Create new codespace with devcontainer
        id: create_cs
        run: |
          echo "Creating codespace from repository ${{ github.repository }} ..."
          
          CS_OUTPUT=$(gh codespace create \
            --repo ${{ github.repository }} \
            --branch main \
            --machine basicLinux32gb \
            --display-name "my-app-$(date +%Y%m%d-%H%M%S)" \
            --idle-timeout 60m \
            --retention-period 7d)
          
          CS_NAME=$(echo "$CS_OUTPUT" | grep -o '"name":"[^"]*"' | head -1 | cut -d'"' -f4)
          
          if [ -z "$CS_NAME" ]; then
            sleep 10
            CS_NAME=$(gh codespace list --json name,createdAt --jq 'sort_by(.createdAt) | last(.[]).name')
          fi
          
          echo "Codespace created: $CS_NAME"
          echo "cs_name=$CS_NAME" >> $GITHUB_OUTPUT
          
          echo "Waiting for devcontainer to be ready (90 seconds)..."
          sleep 90

      - name: Get codespace information
        id: cs_info
        run: |
          CS="${{ steps.create_cs.outputs.cs_name }}"
          
          CS_URL=$(gh codespace view -c "$CS" --json webUrl --jq '.webUrl')
          echo "cs_url=$CS_URL" >> $GITHUB_OUTPUT
          
          echo "Codespace URL:"
          echo "$CS_URL"
          
          gh codespace view -c "$CS"

      - name: Execute script in codespace terminal
        id: run_script
        run: |
          CS="${{ steps.create_cs.outputs.cs_name }}"
          SCRIPT="${{ github.event.inputs.script_to_run }}"
          
          echo "========================================="
          echo "Executing in codespace: $SCRIPT"
          echo "========================================="
          echo ""
          
          gh codespace ssh -c "$CS" -- bash -l -c "
            echo 'Current directory: ' \$(pwd)
            echo 'Environment: ' \$(cat /etc/os-release | grep PRETTY_NAME | cut -d'\"' -f2)
            echo 'Directory contents:'
            ls -la
            echo ''
            echo 'Script output:'
            echo '=== START OF TERMINAL OUTPUT ==='
            cd /workspaces/${{ github.repository.name }}
            $SCRIPT
            echo '=== END OF TERMINAL OUTPUT ==='
          " 2>&1 | tee terminal_full_output.log
          
          echo "script_output<<EOF" >> $GITHUB_OUTPUT
          cat terminal_full_output.log >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Capture VS Code terminal logs
        id: capture_terminal_logs
        run: |
          CS="${{ steps.create_cs.outputs.cs_name }}"
          
          echo "Extracting VS Code terminal logs..."
          
          gh codespace ssh -c "$CS" -- bash << 'EOF' 2>&1 | tee vscode_terminal_raw.log
          
          echo "========================================="
          echo "VS Code Terminal Logs"
          echo "========================================="
          echo ""
          
          echo "--- VS Code PtyHost Log (Terminal Output) ---"
          PTY_LOG=$(find $HOME/.vscode-remote/data/logs -name "ptyhost*.log" 2>/dev/null | head -1)
          if [ -n "$PTY_LOG" ]; then
            echo "File: $PTY_LOG"
            echo "------------------"
            cat "$PTY_LOG" 2>/dev/null | tail -500
          else
            echo "ptyhost log not found, checking other logs..."
          fi
          
          echo ""
          echo "--- VS Code Renderer Log (includes terminal) ---"
          RENDERER_LOG=$(find $HOME/.vscode-remote/data/logs -name "renderer*.log" 2>/dev/null | head -1)
          if [ -n "$RENDERER_LOG" ]; then
            echo "File: $RENDERER_LOG"
            echo "------------------"
            grep -i "terminal\|pty\|command" "$RENDERER_LOG" 2>/dev/null | tail -200
          fi
          
          echo ""
          echo "--- Terminal Command History ---"
          if [ -f "$HOME/.bash_history" ]; then
            echo "Bash history:"
            tail -200 "$HOME/.bash_history"
          elif [ -f "$HOME/.zsh_history" ]; then
            echo "Zsh history:"
            tail -200 "$HOME/.zsh_history"
          fi
          
          echo ""
          echo "--- DevContainer Build Log ---"
          if [ -f "/workspaces/.codespaces/.build.log" ]; then
            echo "Last 100 lines of build log:"
            tail -100 "/workspaces/.codespaces/.build.log"
          fi
          
          echo ""
          echo "--- Running Terminal Processes ---"
          ps aux | grep -E "bash|zsh|node|python" | grep -v grep
          
EOF
          
          echo "Terminal logs saved"

      - name: Generate complete execution report
        run: |
          CS="${{ steps.create_cs.outputs.cs_name }}"
          
          {
            echo "========================================="
            echo "Complete Execution Report"
            echo "========================================="
            echo "Date: $(date)"
            echo "Repository: ${{ github.repository }}"
            echo "Codespace: $CS"
            echo "Executed command: ${{ github.event.inputs.script_to_run }}"
            echo ""
            echo "========================================="
            echo "Script Output"
            echo "========================================="
            cat terminal_full_output.log
            echo ""
            echo "========================================="
            echo "VS Code Raw Terminal Logs"
            echo "========================================="
            cat vscode_terminal_raw.log
          } > complete_execution_report.txt

      - name: Upload logs (codespace remains active)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terminal-logs-from-codespace
          path: |
            *.log
            *.txt
          retention-days: 30

      - name: Display codespace access link
        run: |
          echo "========================================="
          echo "Script execution completed successfully!"
          echo "========================================="
          echo ""
          echo "Codespace is still active and accessible at:"
          echo "  ${{ steps.cs_info.outputs.cs_url }}"
          echo ""
          echo "Log files saved:"
          echo "  - terminal_full_output.log (Full script output)"
          echo "  - vscode_terminal_raw.log (Raw VS Code logs)"
          echo "  - complete_execution_report.txt (Complete report)"
          echo ""
          echo "Download logs from Artifacts section."
          echo ""
          
          {
            echo "## Execution Complete - Codespace Kept Alive"
            echo ""
            echo "### Access Codespace"
            echo "[Click here to open codespace](${{ steps.cs_info.outputs.cs_url }})"
            echo ""
            echo "### Executed Command"
            echo '```bash'
            echo "${{ github.event.inputs.script_to_run }}"
            echo '```'
            echo ""
            echo "### Script Output (Last 200 lines)"
            echo '```bash'
            tail -200 terminal_full_output.log 2>/dev/null || echo "No output available"
            echo '```'
            echo ""
            echo "### Download Logs"
            echo "Full logs available in **Artifacts** section:"
            echo "- `terminal-logs-from-codespace.zip`"
          } >> $GITHUB_STEP_SUMMARY

      - name: Display terminal output
        run: |
          echo ""
          echo "========================================="
          echo "Terminal Output:"
          echo "========================================="
          echo ""
          cat terminal_full_output.log
          echo ""
          echo "========================================="
          echo "End of Output"
          echo "========================================="
