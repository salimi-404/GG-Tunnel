name: Auto Run GG-Tunnel and Save Config

on:
  workflow_dispatch:

jobs:
  auto-run-codespace:
    name: Auto Run GG-Tunnel in Codespace
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    env:
      GH_TOKEN: ${{ secrets.PAT_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          type -p curl >/dev/null || (sudo apt update && sudo apt install curl -y)
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh -y

      - name: Auth with GitHub CLI
        run: |
          echo "${{ secrets.PAT_TOKEN }}" | gh auth login --with-token
          gh auth status

      - name: Create codespace
        id: create_cs
        run: |
          echo "Creating codespace from ${{ github.repository }}..."
          
          CS_NAME=$(gh codespace create \
            --repo ${{ github.repository }} \
            --branch main \
            --machine basicLinux32gb \
            --display-name "gg-tunnel-run-$(date +%Y%m%d-%H%M%S)" \
            --idle-timeout 30m \
            --retention-period 1d)
          
          echo "Raw output: $CS_NAME"
          
          if [[ "$CS_NAME" == *"error"* ]]; then
            echo "Failed to create codespace"
            exit 1
          fi
          
          echo "cs_name=$CS_NAME" >> $GITHUB_OUTPUT
          echo "Codespace created: $CS_NAME"

      - name: Wait for codespace ready
        run: |
          echo "Waiting for codespace to be ready..."
          sleep 120

      - name: Get codespace name
        id: get_cs
        run: |
          CS=$(gh codespace list --json name --jq '.[0].name' 2>/dev/null)
          echo "cs_name=$CS" >> $GITHUB_OUTPUT
          echo "Using codespace: $CS"

      - name: Wait for script to finish
        run: |
          echo "Waiting for auto-script to complete..."
          sleep 180

      - name: Capture terminal logs
        run: |
          CS="${{ steps.get_cs.outputs.cs_name }}"
          
          if [ -z "$CS" ]; then
            echo "No codespace found"
            exit 1
          fi
          
          gh codespace ssh -c "$CS" -- bash -c '
            echo "=== TERMINAL OUTPUT ==="
            echo ""
            
            echo "--- Bash History ---"
            if [ -f "$HOME/.bash_history" ]; then
              tail -300 "$HOME/.bash_history"
            fi
            
            echo ""
            echo "--- VS Code Logs ---"
            if [ -d "$HOME/.vscode-remote/data/logs" ]; then
              LOG_DIR=$(ls -td $HOME/.vscode-remote/data/logs/*/ 2>/dev/null | head -1)
              if [ -n "$LOG_DIR" ]; then
                cat "$LOG_DIR"/*.log 2>/dev/null | tail -500
              fi
            fi
          ' 2>&1 | tee terminal_full_output.log

      - name: Extract config
        run: |
          if grep -q "G-Tunnel GAMING CONFIGS" terminal_full_output.log; then
            grep -A 500 "G-Tunnel GAMING CONFIGS" terminal_full_output.log > Config.txt
          else
            cat terminal_full_output.log > Config.txt
          fi

      - name: Save Config.txt
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Config.txt
          git commit -m "Update Config.txt" || true
          git push || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: |
            *.log
            Config.txt
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          CS="${{ steps.get_cs.outputs.cs_name }}"
          if [ -n "$CS" ]; then
            gh codespace delete -c "$CS" --force || true
          fi
